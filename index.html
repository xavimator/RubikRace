<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0a0818" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>RubikRace</title>

  <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet" />

  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

  <!-- Firebase -->
  <script type="module">
    import { initializeApp }                                       from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getDatabase, ref, set, push, onValue, onChildAdded, query, orderByChild, startAfter }
                                                                   from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const firebaseConfig = {
      apiKey:            "AIzaSyAKAk1w50OFDGXC02V0lcxMvoFcBQ1wPho",
      authDomain:        "rubikrace-online.firebaseapp.com",
      databaseURL:       "https://rubikrace-online-default-rtdb.europe-west1.firebasedatabase.app",
      projectId:         "rubikrace-online",
      storageBucket:     "rubikrace-online.firebasestorage.app",
      messagingSenderId: "233953330878",
      appId:             "1:233953330878:web:6c7dd9dc53a2134d5b80ef",
      measurementId:     "G-69HDDQG5BB"
    };

    const app = initializeApp(firebaseConfig);
    const db  = getDatabase(app);

    // ── Pattern sync ──
    const patternRef = ref(db, 'rubitrack/pattern');
    onValue(patternRef, (snap) => {
      const data = snap.val();
      if (data && Array.isArray(data)) window.__fbPatternReceived(data);
    });
    window.__fbSetPattern = (pattern) => set(patternRef, pattern);

    // ── Game reset sync ──
    const resetRef = ref(db, 'rubitrack/reset');
    onValue(resetRef, (snap) => {
      const val = snap.val();
      if (val && val.ts) window.__fbResetReceived(val.ts);
    });
    window.__fbSendReset = () => set(resetRef, { ts: Date.now() });

    // ── Finish notifications ──
    // onChildAdded with startAfter(now) only fires for NEW children, never old ones
    const notifRef   = ref(db, 'rubitrack/notifications');
    const notifQuery = query(notifRef, orderByChild('ts'), startAfter(Date.now()));
    onChildAdded(notifQuery, (snap) => {
      const item = snap.val();
      if (item) window.__fbNotifReceived(item);
    });

    window.__fbSendFinish = (name, time, moves) => {
      push(notifRef, { name, time, moves, ts: Date.now() });
    };

    window.__fbReady = true;
    window.dispatchEvent(new Event('fbReady'));
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #0a0818; }
    body { overflow-x: hidden; }
    #root { min-height: 100vh; }
    :root { --tile: clamp(50px, calc((100vw - 64px) / 5), 62px); }

    @keyframes pulse      { 0%,100%{opacity:.2} 50%{opacity:.8} }
    @keyframes slideIn    { from{transform:translateY(-30px);opacity:0} to{transform:translateY(0);opacity:1} }
    @keyframes shimmer    { 0%{background-position:200% center} 100%{background-position:-200% center} }
    @keyframes tileSlide  { from{transform:scale(0.92)} to{transform:scale(1)} }
    @keyframes widgetIn   { from{transform:translateY(-14px) scale(.95);opacity:0} to{transform:translateY(0) scale(1);opacity:1} }
    @keyframes panelIn    { from{transform:translateY(-10px);opacity:0} to{transform:translateY(0);opacity:1} }
    @keyframes finishPop  { 0%{transform:scale(0.5) rotate(-8deg);opacity:0} 70%{transform:scale(1.1) rotate(2deg)} 100%{transform:scale(1) rotate(0deg);opacity:1} }
    @keyframes frameIn    { from{opacity:0} to{opacity:1} }
    @keyframes glowPulse  { 0%,100%{text-shadow:0 0 20px rgba(255,220,100,.6),0 0 40px rgba(255,150,50,.4)} 50%{text-shadow:0 0 40px rgba(255,220,100,.9),0 0 80px rgba(255,150,50,.7),0 0 120px rgba(255,100,50,.5)} }
    @keyframes syncPulse  { 0%,100%{opacity:.5;transform:scale(1)} 50%{opacity:1;transform:scale(1.3)} }
    @keyframes toastIn    { from{transform:translateX(120%);opacity:0} to{transform:translateX(0);opacity:1} }
    @keyframes toastOut   { from{transform:translateX(0);opacity:1} to{transform:translateX(120%);opacity:0} }

    .tile-btn  { touch-action:manipulation; -webkit-tap-highlight-color:transparent; }
    .tile-btn:hover  { transform:scale(1.06) !important; filter:brightness(1.25) !important; }
    .tile-btn:active { transform:scale(0.95) !important; }
    .reset-btn:hover  { background:#2a1f5e !important; transform:translateY(-1px); }
    .reset-btn:active { transform:translateY(1px); }
    .legend-btn:hover { opacity:1 !important; }

    /* ══ Widget ══ */
    #rr-widget {
      position:fixed; top:14px; right:14px; z-index:300;
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
      animation:widgetIn .5s cubic-bezier(.34,1.4,.64,1);
    }
    #rr-toggle {
      display:flex; align-items:center; gap:12px;
      background:rgba(10,8,24,0.9);
      border:1.5px solid rgba(156,90,255,0.45); border-radius:16px;
      padding:10px 18px 10px 12px;
      cursor:pointer; color:#c89fff;
      font-size:14px; font-weight:800; letter-spacing:.1em; text-transform:uppercase;
      backdrop-filter:blur(14px);
      transition:background .2s,border-color .2s,box-shadow .2s;
      user-select:none; white-space:nowrap;
      box-shadow:0 4px 20px rgba(0,0,0,0.4);
    }
    #rr-toggle:hover { background:rgba(124,58,237,.3); border-color:rgba(156,90,255,.8); }
    .rr-preview { display:grid; grid-template-columns:repeat(3,1fr); gap:3px; width:48px; }
    .rr-preview span {
      display:block; width:14px; height:14px; border-radius:3px;
      border:1.5px solid #444; transition:background .4s,border-color .4s;
    }
    #rr-sync-dot {
      width:8px; height:8px; border-radius:50%; background:#444; flex-shrink:0; transition:background .4s;
    }
    #rr-sync-dot.connected    { background:#22c55e; animation:syncPulse 2s ease-in-out infinite; }
    #rr-sync-dot.disconnected { background:#ef4444; }
    #rr-sync-dot.connecting   { background:#f59e0b; animation:syncPulse .8s ease-in-out infinite; }

    /* Panel */
    #rr-panel {
      position:absolute; top:calc(100% + 10px); right:0;
      width:min(540px, 92vw);
      background:rgba(6,4,20,0.97);
      border:1.5px solid rgba(156,90,255,0.35); border-radius:22px;
      padding:28px 28px 22px;
      backdrop-filter:blur(18px);
      box-shadow:0 24px 60px rgba(0,0,0,.7),0 0 0 1px rgba(255,255,255,.04);
      animation:panelIn .22s ease;
    }
    #rr-panel.hidden { display:none; }
    #rr-panel-header { display:flex; align-items:center; justify-content:center; gap:10px; margin-bottom:2px; }
    #rr-panel h3 { color:#fff; font-size:22px; font-weight:700; letter-spacing:.05em; }
    .rr-tm { color:#9b59b6; font-size:11px; letter-spacing:4px; text-transform:uppercase; text-align:center; margin-bottom:18px; }
    #rr-status-text { text-align:center; font-size:11px; color:rgba(255,255,255,.3); margin-bottom:14px; letter-spacing:.08em; min-height:16px; }
    #rr-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:18px; }
    .rrcell {
      height:132px; border-radius:12px; border:3px solid #333;
      transition:background .4s ease,border-color .4s ease;
      position:relative; overflow:hidden;
    }
    .rrcell::after {
      content:''; position:absolute; top:0; left:0; right:0; height:40%;
      background:linear-gradient(to bottom,rgba(255,255,255,.18),transparent);
      border-radius:12px 12px 50% 50%; pointer-events:none;
    }
    #rr-shuffle {
      width:100%; padding:14px;
      background:#7c3aed; color:#fff; border:none;
      border-radius:12px; font-size:15px; font-weight:700;
      cursor:pointer; transition:background .2s,transform .1s,opacity .2s;
      letter-spacing:.05em;
    }
    #rr-shuffle:hover   { background:#6d28d9; }
    #rr-shuffle:active  { transform:scale(0.97); }
    #rr-shuffle:disabled{ opacity:.4; cursor:not-allowed; }

    /* Finished overlay */
    .finished-frame {
      position:absolute; inset:0; border-radius:16px;
      box-shadow:inset 0 0 0 calc(12px + var(--tile) + 5px) rgba(0,0,0,0.91);
      display:flex; align-items:center; justify-content:center;
      pointer-events:none; z-index:20;
      animation:frameIn .3s ease;
    }
    .finished-text {
      font-family:'Pacifico',cursive;
      font-size:clamp(28px,7vw,44px);
      background:linear-gradient(135deg,#FFE566 0%,#FFA85C 50%,#F57A7A 100%);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
      animation:finishPop .65s cubic-bezier(.34,1.56,.64,1), glowPulse 2s ease-in-out 1s infinite;
      filter:drop-shadow(0 3px 10px rgba(0,0,0,.9));
      text-align:center; line-height:1.1; padding:8px 16px;
    }

    /* ══ Toast notifications ══ */
    #toast-container {
      position:fixed; bottom:24px; right:16px;
      display:flex; flex-direction:column; gap:10px;
      z-index:500; pointer-events:none;
      max-width:min(340px,90vw);
    }
    .toast {
      background:rgba(6,4,20,0.96);
      border:1.5px solid rgba(34,197,94,.4);
      border-radius:16px; padding:14px 18px;
      backdrop-filter:blur(16px);
      box-shadow:0 8px 32px rgba(0,0,0,.6), 0 0 0 1px rgba(255,255,255,.04);
      animation:toastIn .4s cubic-bezier(.34,1.4,.64,1);
      pointer-events:auto;
    }
    .toast.out { animation:toastOut .4s ease forwards; }
    .toast-emoji { font-size:22px; flex-shrink:0; }
    .toast-row { display:flex; align-items:flex-start; gap:12px; }
    .toast-body { flex:1; }
    .toast-title {
      font-family:'Pacifico',cursive;
      font-size:15px;
      background:linear-gradient(90deg,#FFE566,#FFA85C);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
      line-height:1.2; margin-bottom:4px;
    }
    .toast-msg { font-size:12px; color:rgba(255,255,255,.55); line-height:1.4; }
    .toast-meta { font-size:11px; color:rgba(255,255,255,.3); margin-top:5px; letter-spacing:.05em; }

    /* Name input in panel */
    #rr-name-wrap {
      display:flex; align-items:center; gap:8px;
      margin-bottom:16px;
      background:rgba(255,255,255,.05); border-radius:10px;
      padding:10px 14px; border:1px solid rgba(255,255,255,.1);
    }
    #rr-name-wrap label { font-size:11px; color:rgba(255,255,255,.4); letter-spacing:.1em; text-transform:uppercase; white-space:nowrap; }
    #rr-name-input {
      flex:1; background:transparent; border:none; outline:none;
      color:#fff; font-size:15px; font-weight:600;
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    }
    #rr-name-input::placeholder { color:rgba(255,255,255,.2); }
  </style>
</head>
<body>
  <div id="root"></div>
  <div id="toast-container"></div>

  <!-- ══ Pattern Widget ══ -->
  <div id="rr-widget">
    <div id="rr-toggle" onclick="rrToggle()">
      <div class="rr-preview" id="rr-preview">
        <span></span><span></span><span></span>
        <span></span><span></span><span></span>
        <span></span><span></span><span></span>
      </div>
      Pattern
      <div id="rr-sync-dot" class="connecting" title="Conectando..."></div>
    </div>
    <div id="rr-panel" class="hidden">
      <div id="rr-panel-header">
        <h3>Pattern</h3>
        <div id="rr-sync-dot-panel" style="width:8px;height:8px;border-radius:50%;background:#444;transition:background .4s;"></div>
      </div>
      <p class="rr-tm">Xavimator™</p>
      <div id="rr-status-text">Conectando a Firebase…</div>

      <!-- Player name -->
      <div id="rr-name-wrap">
        <label for="rr-name-input">👤 Jugador</label>
        <input id="rr-name-input" type="text" maxlength="20" placeholder="Tu nombre…" />
      </div>

      <div id="rr-grid"></div>
      <button id="rr-shuffle" onclick="rrShuffle()" disabled>Shuffle</button>
    </div>
  </div>

  <script>
    const RR_COLORS = [
      { bg:'#C8C8D8', border:'#8888A0', puzzleId:'white'  },
      { bg:'#1b5e20', border:'#0a3d0a', puzzleId:'green'  },
      { bg:'#ffeb3b', border:'#f9a825', puzzleId:'yellow' },
      { bg:'#0d47a1', border:'#092f6b', puzzleId:'blue'   },
      { bg:'#f44336', border:'#b71c1c', puzzleId:'red'    },
      { bg:'#ff9800', border:'#e65100', puzzleId:'orange' },
    ];

    let rrOpen = false;
    let fbConnected = false;
    window.rrPattern = [];

    // Save/restore player name
    const nameInput = document.getElementById('rr-name-input');
    nameInput.value = localStorage.getItem('rr-player-name') || '';
    nameInput.addEventListener('input', () => {
      localStorage.setItem('rr-player-name', nameInput.value.trim());
    });
    function getPlayerName() {
      return nameInput.value.trim() || 'Anónimo';
    }
    window.getPlayerName = getPlayerName;

    // Build grid cells
    (function rrInit() {
      const grid = document.getElementById('rr-grid');
      for (let i = 0; i < 9; i++) {
        const cell = document.createElement('div');
        cell.className = 'rrcell';
        grid.appendChild(cell);
      }
    })();

    function rrToggle() {
      rrOpen = !rrOpen;
      document.getElementById('rr-panel').classList.toggle('hidden', !rrOpen);
    }
    document.addEventListener('click', (e) => {
      if (rrOpen && !document.getElementById('rr-widget').contains(e.target)) {
        rrOpen = false;
        document.getElementById('rr-panel').classList.add('hidden');
      }
    });

    function rrApplyPattern(pattern) {
      window.rrPattern = pattern;
      document.querySelectorAll('.rrcell').forEach((cell, i) => {
        cell.style.background  = RR_COLORS[pattern[i]].bg;
        cell.style.borderColor = RR_COLORS[pattern[i]].border;
      });
      document.querySelectorAll('#rr-preview span').forEach((dot, i) => {
        dot.style.background  = RR_COLORS[pattern[i]].bg;
        dot.style.borderColor = RR_COLORS[pattern[i]].border;
      });
      window.dispatchEvent(new CustomEvent('rrPatternChange', { detail: pattern }));
    }

    window.__fbPatternReceived = function(pattern) {
      rrApplyPattern(pattern);
      setConnected(true);
    };

    // ── Toast system ──
    function showToast({ emoji, title, msg, meta }) {
      const container = document.getElementById('toast-container');
      const el = document.createElement('div');
      el.className = 'toast';
      el.innerHTML = `
        <div class="toast-row">
          <div class="toast-emoji">${emoji}</div>
          <div class="toast-body">
            <div class="toast-title">${title}</div>
            <div class="toast-msg">${msg}</div>
            ${meta ? `<div class="toast-meta">${meta}</div>` : ''}
          </div>
        </div>`;
      container.appendChild(el);
      // Auto-dismiss after 5s
      setTimeout(() => {
        el.classList.add('out');
        setTimeout(() => el.remove(), 400);
      }, 5000);
    }

    // ── Receive finish notification from Firebase ──
    // ── Called by Firebase when any client triggers a reset ──
    let lastResetTs = 0;
    window.__fbResetReceived = function(ts) {
      if (ts <= lastResetTs) return;  // ignore stale/duplicate
      lastResetTs = ts;
      window.dispatchEvent(new CustomEvent('rrGlobalReset', { detail: ts }));
    };

    window.__fbNotifReceived = function(item) {
      showToast({
        emoji: '🏁',
        title: `${item.name} ha terminado!`,
        msg:   `Ha completado el patrón`,
        meta:  `⏱ ${item.time} · ${item.moves} movimientos`,
      });
    };

    function rrGenPattern() {
      const result = [], counts = new Array(RR_COLORS.length).fill(0);
      for (let i = 0; i < 9; i++) {
        const avail = RR_COLORS.map((_,idx)=>idx).filter(idx=>counts[idx]<4);
        const pick  = avail[Math.floor(Math.random()*avail.length)];
        counts[pick]++; result.push(pick);
      }
      return result;
    }

    function rrShuffle() {
      const pattern = rrGenPattern();
      if (window.__fbSetPattern) window.__fbSetPattern(pattern);
      else rrApplyPattern(pattern);
    }
    window.rrShuffle = rrShuffle;

    function setConnected(ok) {
      fbConnected = ok;
      const dot      = document.getElementById('rr-sync-dot');
      const dotPanel = document.getElementById('rr-sync-dot-panel');
      const status   = document.getElementById('rr-status-text');
      const btn      = document.getElementById('rr-shuffle');
      dot.className  = ok ? 'connected' : 'disconnected';
      dotPanel.style.background = ok ? '#22c55e' : '#ef4444';
      dotPanel.style.boxShadow  = ok ? '0 0 6px #22c55e' : 'none';
      status.textContent        = ok ? '● Sincronizado en tiempo real' : '● Sin conexión — modo local';
      status.style.color        = ok ? 'rgba(34,197,94,.8)' : 'rgba(239,68,68,.7)';
      btn.disabled = false;
    }

    setTimeout(() => {
      if (!fbConnected) {
        document.getElementById('rr-status-text').textContent = '⚠ Configura Firebase para sincronizar';
        document.getElementById('rr-status-text').style.color = 'rgba(245,158,11,.8)';
        document.getElementById('rr-shuffle').disabled = false;
        rrApplyPattern(rrGenPattern());
      }
    }, 3500);
  </script>

  <!-- ══ React puzzle ══ -->
  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;

    const COLORS = [
      { id:"blue",   label:"Azul",     bg:"#0D3B8E", shine:"#1A5FC8", shadow:"#061E50", text:"#7BAEF5" },
      { id:"green",  label:"Verde",    bg:"#0A6B2E", shine:"#13A346", shadow:"#053A18", text:"#5FD98A" },
      { id:"red",    label:"Rojo",     bg:"#8B0C0C", shine:"#C41A1A", shadow:"#4A0505", text:"#F57A7A" },
      { id:"yellow", label:"Amarillo", bg:"#B89200", shine:"#E8B800", shadow:"#6B5500", text:"#FFE566" },
      { id:"orange", label:"Naranja",  bg:"#B84500", shine:"#E86200", shadow:"#6B2600", text:"#FFA85C" },
      { id:"white",  label:"Blanco",   bg:"#C8C8D8", shine:"#EEEEF8", shadow:"#8888A0", text:"#444460" },
    ];
    const colorMap = {};
    COLORS.forEach(c => { colorMap[c.id] = c; });

    const CENTER = [6,7,8,11,12,13,16,17,18];
    const RR_IDS = ['white','green','yellow','blue','red','orange'];

    function checkMatch(tiles, pattern) {
      if (!pattern || pattern.length < 9) return false;
      return CENTER.every((ti,i) => {
        const t = tiles[ti];
        return t && t.colorId === RR_IDS[pattern[i]];
      });
    }

    function buildSolvedTiles() {
      const tiles = [];
      COLORS.forEach(c => { for(let i=0;i<4;i++) tiles.push({colorId:c.id,num:i+1}); });
      tiles.push(null); return tiles;
    }

    function canMove(ti, ei) {
      const tR=Math.floor(ti/5),tC=ti%5,eR=Math.floor(ei/5),eC=ei%5;
      return (tR===eR&&Math.abs(tC-eC)===1)||(tC===eC&&Math.abs(tR-eR)===1);
    }

    function shuffleTiles(tiles, n=300) {
      let t=[...tiles],e=t.indexOf(null);
      for(let i=0;i<n;i++){
        const nb=[],r=Math.floor(e/5),c=e%5;
        if(r>0)nb.push(e-5);if(r<4)nb.push(e+5);
        if(c>0)nb.push(e-1);if(c<4)nb.push(e+1);
        const p=nb[Math.floor(Math.random()*nb.length)];
        [t[e],t[p]]=[t[p],t[e]];e=p;
      }
      return t;
    }

    function fmt(s){return`${Math.floor(s/60).toString().padStart(2,"0")}:${(s%60).toString().padStart(2,"0")}`;}

    function App() {
      const [tiles,     setTiles]     = useState(()=>shuffleTiles(buildSolvedTiles()));
      const [moves,     setMoves]     = useState(0);
      const [time,      setTime]      = useState(0);
      const [finished,  setFinished]  = useState(false);
      const [lastMoved, setLastMoved] = useState(null);
      const [showLeg,   setShowLeg]   = useState(false);
      const [rrPat,     setRrPat]     = useState([]);
      const timerRef    = useRef(null);
      const finishedRef = useRef(false); // avoid double-firing

      useEffect(() => {
        if (window.rrPattern.length) setRrPat([...window.rrPattern]);
        function onPat(e) {
          setRrPat([...e.detail]);
          setFinished(false);
          finishedRef.current = false;
          if (!timerRef.current) timerRef.current = setInterval(()=>setTime(t=>t+1),1000);
        }
        window.addEventListener('rrPatternChange', onPat);
        return () => window.removeEventListener('rrPatternChange', onPat);
      }, []);

      useEffect(() => {
        if (!finished) {
          timerRef.current = setInterval(()=>setTime(t=>t+1),1000);
        } else {
          clearInterval(timerRef.current); timerRef.current=null;
        }
        return () => { clearInterval(timerRef.current); timerRef.current=null; };
      }, [finished]);

      // Listen for global reset from Firebase
      useEffect(() => {
        function onGlobalReset() { doLocalReset(); }
        window.addEventListener('rrGlobalReset', onGlobalReset);
        return () => window.removeEventListener('rrGlobalReset', onGlobalReset);
      }, []);

      const handleTile = useCallback((idx) => {
        if (finished) return;
        const ei = tiles.indexOf(null);
        if (!canMove(idx,ei)) return;
        const nt = [...tiles];
        [nt[ei],nt[idx]]=[nt[idx],nt[ei]];
        setTiles(nt); setMoves(m=>m+1); setLastMoved(ei);
        if (!finishedRef.current && checkMatch(nt, rrPat)) {
          finishedRef.current = true;
          setFinished(true);
          // Send finish notification to all players
          if (typeof window.__fbSendFinish === 'function') {
            const t = timerRef.current ? null : null; // time captured via closure below
            setTimeout(() => {
              const name = typeof window.getPlayerName==='function' ? window.getPlayerName() : 'Anónimo';
              window.__fbSendFinish(name, fmt(time+1), moves+1);
            }, 50);
          }
        }
      }, [tiles, finished, rrPat, time, moves]);

      const handleReset = () => {
        // Broadcast new pattern + reset to all clients via Firebase
        if (typeof window.rrShuffle === 'function') window.rrShuffle(); // new pattern for everyone
        if (typeof window.__fbSendReset === 'function') window.__fbSendReset(); // reset timer for everyone
        else doLocalReset();
      };
      const doLocalReset = () => {
        setTiles(shuffleTiles(buildSolvedTiles()));
        setMoves(0); setTime(0); setFinished(false); setLastMoved(null);
        finishedRef.current = false;
      };

      const ei = tiles.indexOf(null);

      return (
        <div style={{
          minHeight:"100vh",
          background:"radial-gradient(ellipse at 30% 20%,#1a1035 0%,#0a0818 60%,#000508 100%)",
          display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",
          fontFamily:"'Trebuchet MS','Segoe UI',sans-serif",
          padding:"20px",position:"relative",overflow:"hidden",
        }}>

          {/* Stars */}
          <div style={{position:"absolute",inset:0,pointerEvents:"none",overflow:"hidden"}}>
            {Array.from({length:40}).map((_,i)=>(
              <div key={i} style={{
                position:"absolute",
                width:i%5===0?"3px":"2px",height:i%5===0?"3px":"2px",
                borderRadius:"50%",background:"rgba(255,255,255,.4)",
                top:`${Math.sin(i*7.3)*50+50}%`,left:`${Math.cos(i*5.1)*50+50}%`,
                animation:`pulse ${2+(i%3)}s ease-in-out infinite`,
                animationDelay:`${(i*.3)%3}s`,
              }}/>
            ))}
          </div>

          {/* Title */}
          <div style={{textAlign:"left",marginBottom:"22px",animation:"slideIn .6s ease",alignSelf:"flex-start",paddingLeft:"4px"}}>
            <h1 style={{
              margin:0,fontSize:"clamp(20px,5vw,32px)",fontWeight:900,
              letterSpacing:"0.15em",textTransform:"uppercase",
              background:"linear-gradient(90deg,#7BAEF5,#E8B800,#FFA85C,#5FD98A)",
              backgroundSize:"300% auto",WebkitBackgroundClip:"text",
              WebkitTextFillColor:"transparent",animation:"shimmer 4s linear infinite",
            }}>RubikRace</h1>
            <p style={{margin:"4px 0 0",color:"rgba(255,255,255,.35)",fontSize:"12px",letterSpacing:"0.2em"}}>
              5 × 5 · SLIDING PUZZLE
            </p>
          </div>

          {/* Stats */}
          <div style={{
            display:"flex",gap:"28px",marginBottom:"16px",
            background:"rgba(255,255,255,.06)",borderRadius:"12px",
            padding:"10px 28px",border:"1px solid rgba(255,255,255,.1)",
            backdropFilter:"blur(8px)",
          }}>
            {[{label:"MOVIMIENTOS",value:moves},{label:"TIEMPO",value:fmt(time)}].map(s=>(
              <div key={s.label} style={{textAlign:"center"}}>
                <div style={{fontSize:"22px",fontWeight:800,color:"#fff",lineHeight:1}}>{s.value}</div>
                <div style={{fontSize:"10px",color:"rgba(255,255,255,.4)",letterSpacing:".12em",marginTop:"2px"}}>{s.label}</div>
              </div>
            ))}
          </div>

          {/* Board */}
          <div style={{position:"relative"}}>
            <div style={{
              display:"grid",gridTemplateColumns:"repeat(5,var(--tile))",
              gap:"5px",padding:"12px",
              background:"rgba(255,255,255,.04)",borderRadius:"16px",
              border:"1px solid rgba(255,255,255,.08)",
              boxShadow:"0 20px 60px rgba(0,0,0,.6),inset 0 1px 0 rgba(255,255,255,.1)",
            }}>
              {tiles.map((tile,idx)=>{
                if(tile===null) return (
                  <div key="empty" style={{
                    width:"var(--tile)",height:"var(--tile)",borderRadius:"8px",
                    background:"rgba(0,0,0,.3)",border:"2px dashed rgba(255,255,255,.08)",
                  }}/>
                );
                const c=colorMap[tile.colorId];
                const isAdj=canMove(idx,ei);
                return (
                  <button key={`${tile.colorId}-${tile.num}`} className="tile-btn"
                    onClick={()=>handleTile(idx)}
                    style={{
                      width:"var(--tile)",height:"var(--tile)",
                      borderRadius:"8px",border:"none",
                      cursor:isAdj?"pointer":"default",
                      background:`linear-gradient(145deg,${c.shine} 0%,${c.bg} 50%,${c.shadow} 100%)`,
                      boxShadow:`0 4px 0 ${c.shadow},0 6px 16px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.25)`,
                      transition:"transform .1s,filter .1s",
                      transform:isAdj?"scale(1.02)":"scale(1)",
                      filter:isAdj?"brightness(1.1)":"brightness(1)",
                      animation:idx===lastMoved?"tileSlide .15s ease":"none",
                      position:"relative",overflow:"hidden",
                    }}
                  >
                    <div style={{
                      position:"absolute",top:0,left:0,right:0,height:"45%",
                      borderRadius:"8px 8px 50% 50%",
                      background:"linear-gradient(to bottom,rgba(255,255,255,.2),transparent)",
                      pointerEvents:"none",
                    }}/>
                  </button>
                );
              })}
            </div>
            {finished && (
              <div className="finished-frame">
                <div className="finished-text">Finished!!</div>
              </div>
            )}
          </div>

          {/* Legend */}
          <button className="legend-btn" onClick={()=>setShowLeg(v=>!v)} style={{
            marginTop:"14px",background:"none",
            border:"1px solid rgba(255,255,255,.15)",borderRadius:"8px",
            color:"rgba(255,255,255,.5)",fontSize:"12px",
            padding:"6px 16px",cursor:"pointer",
            letterSpacing:".1em",transition:"opacity .2s",opacity:.7,
          }}>{showLeg?"▲ OCULTAR LEYENDA":"▼ VER LEYENDA"}</button>

          {showLeg&&(
            <div style={{marginTop:"10px",display:"flex",flexWrap:"wrap",gap:"8px",justifyContent:"center",maxWidth:"380px",animation:"slideIn .2s ease"}}>
              {COLORS.map(c=>(
                <div key={c.id} style={{display:"flex",alignItems:"center",gap:"6px",background:"rgba(255,255,255,.06)",borderRadius:"6px",padding:"5px 10px",border:"1px solid rgba(255,255,255,.08)"}}>
                  <div style={{display:"flex",gap:"3px"}}>
                    {[1,2,3,4].map(n=>(
                      <div key={n} style={{width:"14px",height:"14px",borderRadius:"3px",background:`linear-gradient(135deg,${c.shine},${c.bg})`,boxShadow:`0 2px 0 ${c.shadow}`}}/>
                    ))}
                  </div>
                  <span style={{fontSize:"11px",color:c.text,fontWeight:700}}>{c.label}</span>
                </div>
              ))}
            </div>
          )}

          {/* Reset */}
          <button className="reset-btn" onClick={handleReset} style={{
            marginTop:"18px",padding:"11px 32px",borderRadius:"10px",
            border:"1px solid rgba(255,255,255,.15)",
            background:"rgba(255,255,255,.07)",color:"#fff",
            fontSize:"13px",fontWeight:700,letterSpacing:".15em",
            cursor:"pointer",transition:"all .2s",textTransform:"uppercase",
          }}>↺ Nuevo Juego</button>

        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
